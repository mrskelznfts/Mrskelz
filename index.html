<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MR. SKELZ - Underground Society</title>
  <script>
    // Prevent right-click
    document.addEventListener('contextmenu', event => event.preventDefault());

    // Prevent common DevTools shortcuts
    document.onkeydown = function (e) {
      if (event.keyCode == 123) { return false; }
      if (e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) { return false; }
      if (e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) { return false; }
      if (e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) { return false; }
      if (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) { return false; }
    }
  </script>
</head>

<body oncontextmenu="return false;">
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
  <script>
    // Detect if DevTools is open via debugger
    setInterval(function () {
      const start = new Date();
      debugger;
      const end = new Date();
      if (end - start > 100) {
        // If debugger causes a significant delay, DevTools is likely open
        document.body.innerHTML = "<div style='background:#000;color:gold;height:100vh;display:flex;align-items:center;justify-content:center;font-family:serif;font-size:2rem;'>MR. SKELZ IS WATCHING... NO PEEPING!</div>";
      }
    }, 1000);
  </script>
</body>

</html>
